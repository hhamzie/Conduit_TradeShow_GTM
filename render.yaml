services:
  - type: web
    name: hpointscraper
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    disk:
      name: exports
      mountPath: /app/data/exports
      sizeGB: 5
    envVars:
      - key: EXPORT_DIR
        value: /app/data/exports
      - key: DATABASE_URL
        fromDatabase:
          name: hpointscraper-db
          property: connectionString

databases:
  - name: hpointscraper-db
    plan: starter
